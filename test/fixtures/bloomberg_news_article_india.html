t":160,"id":"442548500","origHeight":2000,"origWidth":2000,"size":null,"title":"Akriti Sharma ","type":"image","url":"https://assets.bwbx.io/images/users/iqjWHBFdfxIU/iNJph7.hEAF8/v1/piUjdcePl62Og/160x160.jpg","width":160,"themes":null,"__typename":"Image"},"photoDisplayed":true,"roles":["by","author"],"attributionPreferences":{"fullNamePreference":"Akriti Sharma","locationPreference":"New Delhi","__typename":"AttributionDetails"},"__typename":"Person","profileUrl":"AWbIAwaDmaA/akriti-sharma"}],"audios":[],"body":{"type":"document","content":[{"type":"inline-newsletter","data":{"position":"top"},"content":[]},{"type":"paragraph","data":{},"content":[{"type":"text","value":"Floodlights sweep across the 16th century fort’s ramparts as thousands stream inside — women in colorful saris, men in kurta pajamas, college girls in kurtis over jeans. One small girl dressed as the goddess Radha, her flower crown askew, tugs at her parents’ hands in excitement."}]},{"type":"paragraph","data":{},"content":[{"type":"text","value":"The air hums with anticipation familiar to any concert crowd. A bassline drops. Performers flanked by dancers take the stage, their voices building to a crescendo. People clap and sway, some with eyes closed, singing along — not to a pop anthem, but chanting the names of God."}]},{"type":"paragraph","data":{},"content":[{"type":"text","value":"Scenes like this in New Delhi are multiplying across India’s biggest cities as Gen Z and millennials, often with their families in tow, gravitate toward a different kind of nightlife. There’s no alcohol or celebrity DJs. Instead, crowds sing invocations to Hindu deities like Ram and Krishna over bass-heavy beats and amplified drums. Known as bhajan clubbing, the format takes a devotional tradition once rooted in temples and family prayer and repackages it for a younger generation."}]},{"type":"ad","data":{"num":1,"pageId":"article"},"content":[]},{"type":"paragraph","data":{},"content":[{"type":"text","value":"From small cafes to "},{"type":"entity","subType":"story","data":{"story":{"identifiers":{}},"link":{"data-web-url":"https://www.bloomberg.com/news/newsletters/2026-01-22/india-s-gen-z-parties-with-bhajan-jamming-baithaks-in-quest-for-spirituality?taid=6971c6677a834d00016bab64\u0026utm_campaign=trueanthem\u0026utm_content=business\u0026utm_medium=social\u0026utm_source=twitter","href":"bbg://news/stories/T996E3KIP3IQ","itemprop":"StoryLink","itemscope":"itemscope","title":"India Parties With Bhajan Jamming and Home Concerts","webUrl":"https://www.bloomberg.com/news/newsletters/2026-01-22/india-s-gen-z-parties-with-bhajan-jamming-baithaks-in-quest-for-spirituality?taid=6971c6677a834d00016bab64\u0026utm_campaign=trueanthem\u0026utm_content=business\u0026utm_medium=social\u0026utm_source=twitter","tooltip":"India Parties With Bhajan Jamming and Home Concerts","destination":{"web":"https://www.bloomberg.com/news/newsletters/2026-01-22/india-s-gen-z-parties-with-bhajan-jamming-baithaks-in-quest-for-spirituality?taid=6971c6677a834d00016bab64\u0026utm_campaign=trueanthem\u0026utm_content=business\u0026utm_medium=social\u0026utm_source=twitter","bbg":"bbg://news/stories/T996E3KIP3IQ"}}},"content":[{"type":"text","value":"shopping malls"}],"meta":{"type":"StoryLink"}},{"type":"text","value":" and now "},{"type":"link","data":{"href":"https://theprint.in/feature/delhi-just-had-its-biggest-bhajan-clubbing-event-glitter-tilak-and-jai-shree-ram/2815503/","itemprop":"StoryLink","itemscope":"itemscope","title":"Delhi just had its biggest bhajan clubbing event—glitter, tilak, and Jai Shree Ram","tooltip":"Delhi just had its biggest bhajan clubbing event—glitter, tilak, and Jai Shree Ram","destination":{"web":"https://theprint.in/feature/delhi-just-had-its-biggest-bhajan-clubbing-event-glitter-tilak-and-jai-shree-ram/2815503/"}},"content":[{"type":"text","value":"stadiums"}]},{"type":"text","value":", such gatherings are scaling up. Ticketing platforms list bhajan clubbing alongside rock concerts or comedy shows, while Google "},{"type":"link","data":{"href":"https://trends.google.com/trends/explore?geo=IN\u0026q=bhajan%20clubbing","itemprop":"StoryLink","itemscope":"itemscope","title":"Google Trends: Bhajan Clubbing","tooltip":"Google Trends: Bhajan Clubbing","destination":{"web":"https://trends.google.com/trends/explore?geo=IN\u0026q=bhajan%20clubbing"}},"content":[{"type":"text","value":"search interest"}]},{"type":"text","value":" has climbed since late 2025. “Our goal is to give people a Tomorrowland-like experience, but devotional,” says Nikunj Gupta, whose company "},{"type":"link","data":{"href":"https://sanatanajourney.com/","itemprop":"StoryLink","itemscope":"itemscope","title":"Sanatana Journey","tooltip":"Sanatana Journey","destination":{"web":"https://sanatanajourney.com/"}},"content":[{"type":"text","value":"Sanatana Journey"}]},{"type":"text","value":" organizes such events, referring to the electronic dance music festival in Belgium."}]},{"type":"paragraph","data":{},"content":[{"type":"text","value":"The rise of bhajan clubbing, also called bhajan jamming, reflects a broader shift in India, where religion is increasingly visible in public life and being openly, joyfully Hindu has become, for many young Indians, not just acceptable but aspirational. From pilgrimages to meditation retreats to bespoke online prayer services, India’s "},{"type":"link","data":{"href":"https://www.imarcgroup.com/india-religious-spiritual-market","itemprop":"StoryLink","itemscope":"itemscope","title":"India Religious and Spiritual Market Summary","tooltip":"India Religious and Spiritual Market Summary","destination":{"web":"https://www.imarcgroup.com/india-religious-spiritual-market"}},"content":[{"type":"text","value":"religious and spiritual market"}]},{"type":"text","value":" is projected to almost double in value to more than $135 billion by 2034."}]},{"type":"paragraph","data":{},"content":[{"type":"text","value":"The growth is driven by a mix of forces: Prime Minister Narendra Modi’s emphasis on a more overtly Hindu national culture, a social media boom that’s helped make Hinduism fashionable and a post-pandemic search for meaning. A generation shaped by Covid-19 — isolated, anxious, and online — is seeking something a bar tab cannot provide."}]},{"type":"paragraph","data":{},"content":[{"type":"text","value":"The trend has parallels elsewhere. In the US, megachurches have long blended worship with the aesthetics of live entertainment. Across Europe, alcohol-free ecstatic dance gatherings have expanded since the pandemic, while communities such as "},{"type":"link","data":{"href":"https://thesobercurator.com/wake-up-and-dance-with-daybreaker-the-global-virtual-sober-morning-dance-community-your-newest-healthy-addiction-virtual-sober-dance-party/","itemprop":"StoryLink","itemscope":"itemscope","title":"Wake Up \u0026 Dance! Here’s How To Get Connected With Daybreaker, The Global Sober Morning Dance Community","tooltip":"Wake Up \u0026 Dance! Here’s How To Get Connected With Daybreaker, The Global Sober Morning Dance Community","destination":{"web":"https://thesobercurator.com/wake-up-and-dance-with-daybreaker-the-global-virtual-sober-morning-dance-community-your-newest-healthy-addiction-virtual-sober-dance-party/"}},"content":[{"type":"text","value":"Daybreaker"}]},{"type":"text","value":" — a sober morning dance movement founded in New York — now operate in dozens of cities worldwide."}]},{"type":"paragraph","data":{},"content":[{"type":"text","value":"“Earlier, going to a club and drinking was a status symbol,” says Gourank Gupta, 23, as chants echo across New Delhi’s Purana Qila fort on a recent Sunday evening. “Now it feels like the status symbol is living a healthy life.”"}]},{"type":"paragraph","data":{},"content":[{"type":"text","value":"Such gatherings offer the energy and social connection of a night out without the pressure to drink or use substances to fit in, says Gupta, who works for a software company. The next morning, he adds, brings “no hangover, no regret, just a sober high.”"}]},{"type":"ad","data":{"num":2,"pageId":"article"},"content":[]},{"type":"paragraph","data":{},"content":[{"type":"text","value":"Away from the stage, the scene resembles a temple fair. Stalls line the perimeter, selling prayer items such as incense sticks and camphor, copies of the holy book Bhagavad Gita and delicacies such as kachoris and jalebis. Marigold and saffron garlands hang from trees. Groups sit cross-legged on the ground, palms folded, eyes half-closed, listening to the music."}]},{"type":"paragraph","data":{},"content":[{"type":"text","value":"For Liza Gupta, 28, who has attended a handful of bhajan clubbing events, it’s a quieter and safer alternative to other nightlife. “It felt like a treasure,” she says, watching people dance with “hearts filled with love of God.”"}]},{"type":"media","subType":"photo","data":{"identifiers":{"avmmId":455906087},"remoteContent":[{"link":{"destination":{"bbg":"http://resource.bloomberg.com/images/455906087","web":"https://assets.bwbx.io/images/users/iqjWHBFdfxIU/iSIp9i_aZiJQ/v1/-1x-1.webp"}},"rendition":"highres"}],"photo":{"align":"center","data-align":"center","data-id":"455906087","data-image-size":"column","data-image-type":"photo","data-type":"image","id":455906087,"imageSize":"column","imageType":"photo","type":"image","src":"https://assets.bwbx.io/images/users/iqjWHBFdfxIU/iSIp9i_aZiJQ/v1/-1x-1.webp","alt":"Performers take the stage at a bhajan jamming event at New Delhi’s Purana Qila fort.","caption":"Performers take the stage at a bhajan jamming event at New Delhi\u0026#x2019;s Purana Qila fort.","credit":"\u003cem\u003eSource: Sanatana Journey\u003c/em\u003e"},"attachment":{"alt":"0515_WEEKEND_Bhajan Jamming","caption":null,"credit":null,"height":1333,"id":"455906087","origHeight":1333,"origWidth":2000,"size":null,"title":"0515_WEEKEND_Bhajan Jamming","type":"image","url":"https://assets.bwbx.io/images/users/iqjWHBFdfxIU/iSIp9i_aZiJQ/v1/-1x-1.webp","width":2000,"themes":null,"__typename":"Image"}}},{"type":"paragraph","data":{},"content":[{"type":"text","value":"The popularity of bhajan clubbing underscores how religious practice remains deeply embedded in Indian society, even as younger generations reshape its forms. Kirtan — call-and-response devotional chanting — has long been part of social and spiritual life, whether in homes, neighborhood gatherings or temples. What has changed is the setting, with traditions recast in a concert-like format."}]},{"type":"paragraph","data":{},"content":[{"type":"text","value":"“We’re a culture rooted in song and dance,” says Anoop Lather, who chairs Delhi University’s Culture Council. “We have a song for every occasion — from when a mother conceives to when a person dies. It just takes different forms over the generations.”"}]},{"type":"paragraph","data":{},"content":[{"type":"text","value":"The gatherings draw families together: Parents attend alongside children, and students who might rarely visit temples find themselves singing alongside older relatives. “It bridges a gap,” Lather says."}]},{"type":"media","subType":"video","data":{"identifiers":{"avmmId":456126851},"remoteContent":[{"link":{"destination":{"bbg":"http://resource.bloomberg.com/images/456126851","web":"https://www.bloomberg.com/media-manifest/videos/android/WiFi/5493638b-7445-46f5-bd13-73a076972f25.m3u8?idType=BMMP"}},"rendition":"highres"}],"video":{"class":"center","data-align":"center","data-id":"456126851","data-image-type":"video","data-type":"image","align":"center","id":456126851,"imageType":"video","type":"image","src":"https://www.bloomberg.com/media-manifest/videos/android/WiFi/5493638b-7445-46f5-bd13-73a076972f25.m3u8?idType=BMMP","alt":"","caption":"\u0026quot;Bhajan clubbing\u0026quot; reshapes Gen Z faith in India","credit":""},"attachment":{"aspectRatio":"ASPECT_9_16","autoplay":null,"avmmIds":["456126851"],"compressedIds":"5493638b-7445-46f5-bd13-73a076972f25","duration":108360,"id":"5493638b-7445-46f5-bd13-73a076972f25","prerollAdUnit":"vod","showName":null,"streams":[{"url":"https://www.bloomberg.com/media-manifest/videos/android/WiFi/5493638b-7445-46f5-bd13-73a076972f25.m3u8?idType=BMMP","type":"application/x-mpegURL","format":"TS","__typename":"VideoStream"}],"title":"\"Bhajan clubbing\" reshapes Gen Z faith in India","transcript":null,"thumbnail":{"alt":null,"caption":null,"credit":null,"height":1920,"id":"dynamic","origHeight":1920,"origWidth":1080,"size":null,"title":null,"type":"image","url":"https://assets.bwbx.io/images/users/iqjWHBFdfxIU/iqqEEV7HPt8o/v3/-1x-1.jpg","width":1080,"themes":null,"__typename":"Image"},"type":"video","__typename":"Video"},"link":{"destination":{"bbg":"bbg://news/video/456126851"}}}},{"type":"paragraph","data":{},"content":[{"type":"text","value":"For 24-year-old Khushi Puri, who attended the fort gathering, the appeal is both cultural and personal. “It’s an escape from the monotony of the city’s party circuit,” she says, “but also a way to feel more connected to my roots, and to spend time with my parents — something you wouldn’t do at a regular club or concert.”"}]},{"type":"ad","data":{"num":3,"pageId":"article"},"content":[]},{"type":"paragraph","data":{},"content":[{"type":"text","value":"Academics see a deeper social shift beneath the spectacle. As people migrate from smaller towns to cities, they seek out community and like-minded people, says Ramu Manivannan, a political scientist and former head of the Department of Politics and Public Administration at the University of Madras. “People try to create a kind of safety net after their hard day at work,” he says. “They want the time to reflect.”"}]},{"type":"paragraph","data":{},"content":[{"type":"text","value":"Social media has accelerated the trend, with videos of packed crowds chanting in unison, lights strobing behind them, circulating widely on Instagram."}]},{"type":"inline-newsletter","data":{"position":"middle"},"content":[]},{"type":"paragraph","data":{},"content":[{"type":"text","value":"Modi has "},{"type":"link","data":{"href":"https://x.com/narendramodi/status/2015317286207561808","itemprop":"StoryLink","itemscope":"itemscope","target":"_blank","title":"X Post","tooltip":"X Post","destination":{"web":"https://x.com/narendramodi/status/2015317286207561808"}},"content":[{"type":"text","value":"praised"}]},{"type":"text","value":" bhajan clubbing as a blend of spirituality and modernity. It’s also popular at India’s lavish, multiday weddings. Last month, Anant Ambani, the youngest son of Indian billionaire Mukesh Ambani, "},{"type":"link","data":{"href":"https://www.instagram.com/reels/DXC0EnRiO6Y/","itemprop":"StoryLink","itemscope":"itemscope","title":"Instagram: Anant Ambani","tooltip":"Instagram: Anant Ambani","destination":{"web":"https://www.instagram.com/reels/DXC0EnRiO6Y/"}},"content":[{"type":"text","value":"celebrated his birthday"}]},{"type":"text","value":" with a bhajan clubbing event. Corporate India has taken notice, too: "},{"type":"link","data":{"href":"https://www.bloomberg.com/quote/ITC:IN","itemprop":"StoryLink","itemscope":"itemscope","target":"_blank","title":"Company Overview: ITC Ltd","tooltip":"Company Overview: ITC Ltd","destination":{"web":"https://www.bloomberg.com/quote/ITC:IN"}},"content":[{"type":"text","value":"ITC Ltd."}]},{"type":"text","value":", a conglomerate spanning hotels, packaged food and information technology, has used its incense brand to "},{"type":"link","data":{"href":"https://www.instagram.com/reels/DWYri89D1B-/","itemprop":"StoryLink","itemscope":"itemscope","target":"_blank","title":"Instagram: ITC","tooltip":"Instagram: ITC","destination":{"web":"https://www.instagram.com/reels/DWYri89D1B-/"}},"content":[{"type":"text","value":"sponsor"}]},{"type":"text","value":" large-scale devotional music festivals."}]},{"type":"paragraph","data":{},"content":[{"type":"text","value":"The format is spreading beyond India’s biggest metros and into Hindu-majority neighbors such as "},{"type":"link","data":{"href":"https://www.instagram.com/p/DSMlIPGAIuD/","itemprop":"StoryLink","itemscope":"itemscope","title":"Instagram: Bhajan Clubbing","tooltip":"Instagram: Bhajan Clubbing","destination":{"web":"https://www.instagram.com/p/DSMlIPGAIuD/"}},"content":[{"type":"text","value":"Nepal"}]},{"type":"text","value":". In Amritsar, a city in the northern state of Punjab, 29-year-old Tania Khurana hosted her first bhajan clubbing event at a cafe last month. It sold out within days, with demand spilling onto a long waiting list, prompting her to book a larger venue for the next edition. The social media manager now plans to pursue the events full time — a move she frames less as a business decision than a personal one. “I am not myself if I am not connected with God,” she says."}]},{"type":"paragraph","data":{},"content":[{"type":"text","value":"The pull is unmistakable. On the night of a major cricket final — the kind that usually stills the nation — a crowd gathered instead to chant devotions at a shopping mall in Gurugram, some 30 kilometers (18.6 miles) from New Delhi. In a country where the sacred has long been folded into the everyday, bhajan clubbing feels less like a reinvention than a reframing for a generation searching for meaning beyond the familiar circuits of nightlife."}]},{"type":"ad","data":{"num":4,"pageId":"article"},"content":[]},{"type":"paragraph","data":{},"content":[{"type":"text","value":"“The high you get here,” one performer said to the sea of raised hands, “won’t fade tomorrow.”"}]},{"type":"inline-newsletter","data":{"position":"bottom"},"content":[]}],"data":{}},"brand":"weekend-edition","blensSecurities":["ITC:IN"],"byline":"Eshani Mathur and Akriti Sharma","categories":["world"],"charts":[],"checksum":"1d6005f0640946698b642249a54858e9","corrected":false,"disableAds":false,"disclaimer":null,"cobrand":null,"collections":{"record":null,"recordId":null,"weekend":{"title":"2026-05-15 Bloom
