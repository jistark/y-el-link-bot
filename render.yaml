services:
  - type: web
    name: y-el-link-bot
    runtime: docker
    repo: https://github.com/jistark/y-el-link-bot.git
    branch: main
    plan: starter
    healthCheckPath: /health
    disk:
      name: bot-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAPH_ACCESS_TOKEN
        sync: false
      - key: WEBHOOK_URL
        sync: false
      - key: POLLER_CHAT_ID
        sync: false
      - key: PROXY_URL
        sync: false
      - key: PROXY_DOMAINS
        sync: false
      - key: PROXY_JS_DOMAINS
        sync: false
